# Cargo aliases — shortcuts for the commands whose flags aren't worth memorizing.
# Each alias maps to a single `cargo <subcommand>` invocation (aliases can't chain),
# so the full pre-push gate is run as separate commands:
#   cargo fmt --check && cargo lint && cargo test && cargo wasm
#
# (`cargo test` and `cargo fmt` are already short/memorable, so they get no alias —
# and `fmt` couldn't be aliased anyway, since cargo ignores aliases shadowing built-ins.)
[alias]
# Lint with warnings-as-errors across the whole workspace and all targets (tests, benches).
lint = "clippy --workspace --all-targets -- -D warnings"

# Portability check: engine + bindings compiled for wasm32 (excludes the native harness).
wasm = "check -p engine -p wasm-bindings --target wasm32-unknown-unknown"
