name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml drives the channel; ensure components + wasm target.
      - name: Toolchain
        run: |
          rustup show
          rustup component add clippy rustfmt
          rustup target add wasm32-unknown-unknown

      - name: Cache
        uses: Swatinem/rust-cache@v2

      # These mirror the local pre-push gate exactly, via the aliases in
      # .cargo/config.toml — one definition shared by local and CI.
      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo lint

      - name: Test
        run: cargo test --workspace

      # Portability of engine + capture + bindings on wasm32 (the native-only harness is excluded).
      - name: Wasm check
        run: cargo wasm

      # Doc build with broken-intra-doc-link and bare-URL lints denied (see .cargo/config.toml).
      - name: Docs
        run: cargo docs

      # `cargo wasm` only type-checks; this actually runs wasm-bindgen, catching bindgen breakage a
      # bare check can't (e.g. an un-bindgen-able exported signature). `--dev` runs wasm-bindgen but
      # skips the wasm-opt download, so it's fast and non-flaky. wasm-pack fetches a wasm-bindgen-cli
      # matching the crate version in Cargo.lock. See crates/wasm-bindings/README.md.
      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Wasm build (bindgen)
        run: wasm-pack build crates/wasm-bindings --target web --dev

  # The web harness (Svelte/TS). Mirrors the local web gate: typecheck, Biome, Vitest, and a build.
  # Independent of the Rust gate above, so it runs in parallel. No wasm artifact is needed — the build
  # bundles main.ts and copies public/; the wasm is fetched at runtime, not at build.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint (Biome)
        run: pnpm run check

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
